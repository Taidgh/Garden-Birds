version: '3.8'
services:
  backend:
    build: ./backend
    container_name: bird-detective-backend
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - BIRDNET_URL=http://192.168.1.70:8080
      - POLL_INTERVAL=30000
      - ADMIN_USER=Admin
      - ADMIN_PASS=Change-This-Password
      - BIRD_SECRET=c05a442eea384fbdbce7b0960ebd4010af9601d9173cdfc5c891511a9c2cf796
    volumes:
      - bird-data:/app/data
    networks:
      - bird-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
        - VITE_REFRESH_INTERVAL=30000
    container_name: bird-detective-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - bird-net

networks:
  bird-net:
    driver: bridge

volumes:
  bird-data:
